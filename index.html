<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart Gefrierschrank</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- QR Code -->
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
</head>

<body>

<h1>❄️ Smart Gefrierschrank</h1>
<p>Version 4 mit Familien-Sync und QR-Code</p>

<h2>Lebensmittel hinzufügen</h2>

<input id="freezerInput" placeholder="Gefrierschrank">
<input id="sectionInput" placeholder="Fach">
<input id="foodInput" placeholder="Lebensmittel">
<input id="amountInput" type="number" value="1">
<input id="dateInput" type="date">

<button onclick="addItem()">Speichern</button>

<h2>Inventar</h2>
<div id="list"></div>

<h2>QR-Code Generator</h2>

<input id="qrFreezerInput" placeholder="Gefrierschrank">
<input id="qrSectionInput" placeholder="Fach">

<button onclick="generateQR()">QR-Code erstellen</button>

<pre id="qrOutput"></pre>
<canvas id="qrCanvas"></canvas>

<script src="app.js"></script>

</body>
</html>
